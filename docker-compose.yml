services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - backend/.env
    volumes:
      - ./docs:/workspace/docs
      - ${PUBLISH_REPO_DIR:-~/Projects/LLM_Knowledge_Base}:/publish-repo
      - ./deepagents:/workspace/deepagents
      - ./autogen:/workspace/autogen
      - ./opencode:/workspace/opencode
      - ./openclaw:/workspace/openclaw
      - ./hermes-agent:/workspace/hermes-agent
      - ./claude_code:/workspace/claude_code
      - backend_data:/workspace/backend/data
    environment:
      - PUBLISH_REPO_DIR=/publish-repo
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_URL=http://host.docker.internal:11434
      - OLLAMA_CHAT_MODEL=qwen3.5
      - OTEL_OTEL_ENDPOINT=http://otel-collector:4317
      - OTEL_ENABLED=true
      - MEILISEARCH_URL=http://meilisearch:7700
      # ENVIRONMENT and APP_MFA_SECRET should come from .env file
      # In development, create .env with ENVIRONMENT=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector
      - ollama
      - meilisearch
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: /bin/sh
    command: >
      -c "
        until ollama list; do
          echo 'Waiting for Ollama to be ready...';
          sleep 2;
        done;
        ollama pull nomic-embed-text
      "
    depends_on:
      - ollama

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_EXPERIMENTAL_VECTOR_STORE: "true"
    mem_limit: 256m
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./backend/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    volumes:
      - ./backend/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "19999:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  ollama_data:
  backend_data:
  meili_data:
